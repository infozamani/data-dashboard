<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>داشبورد تحلیل داده</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Tahoma', sans-serif; }
        .container { max-width: 1200px; margin-top: 20px; }
        @media (max-width: 768px) {
            .container { padding: 10px; }
            h1 { font-size: 1.8rem; }
            .btn { font-size: 0.9rem; padding: 8px 12px; }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dataset_list' %}">📊 داشبورد داده</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'dataset_list' %}">دیتاست‌ها</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'upload_excel' %}">آپلود اکسل</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'api_setup' %}">API</a></li>
                </ul>
                {% if user.is_authenticated %}
                <span class="navbar-text text-white">خوش آمدی {{ user.username }}</span>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
